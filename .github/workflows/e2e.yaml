name: E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e:
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25.8'

    - name: Build nanok8s
      run: |
        mkdir -p bin
        # Build standard version
        go build -o bin/nanok8s ./cmd/nanok8s
        
        # Build a newer version for upgrade testing (mocking v1.36.0)
        go build -ldflags="-X github.com/MatchaScript/nanok8s/internal/version.KubernetesVersion=v1.36.0" -o bin/nanok8s-v1.36.0 ./cmd/nanok8s

        # Put the main binary in place for the script
        sudo cp bin/nanok8s /usr/bin/nanok8s

    - name: Run E2E Test Suite
      run: sudo ./test/e2e/e2e.sh
